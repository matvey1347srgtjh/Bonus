{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ИРЗ Бонус{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style/style.css' %}">
</head>
<body>
    <header>
        <div class="logo">ИРЗ БОНУС</div>
        <nav class="header-nav">
            {% if user.is_authenticated %}
                <a href="{% url 'users:profile' %}" class="user-info">
                {{ user.username }} | <strong>{{ user.wallet.balance }}</strong> Баллов
            </a>
                <a href="{% url 'merch:index' %}">Магазин</a>
                <form action="{% url 'users:logout' %}" method="post" class="logout-form">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">Выйти</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Вход</a>
            {% endif %}
        </nav>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        &copy; 2026 Акционерное Общество «Ижевский радиозавод»
    </footer>
</body>
</html>
