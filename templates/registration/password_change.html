{% extends "base.html" %}
{% block content %}
<div class="login-card">
    <h2>Смените пароль</h2>
    <p>Для доступа к магазину необходимо сменить заводской пароль на личный.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Сохранить новый пароль</button>
    </form>
</div>
{% endblock %}
